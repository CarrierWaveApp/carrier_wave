name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run full performance tests nightly at 3am UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint .

      - name: Run SwiftLint
        run: swiftlint lint --strict

  # Unit tests on every PR
  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run unit tests
        run: make test-unit

  # Quick performance test on every PR (50k QSOs, ~1-2 min)
  performance-quick:
    name: Performance (Quick)
    runs-on: macos-15
    # Skip on scheduled runs (full test runs instead)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run quick performance test
        run: make test-performance-quick

  # Full performance test nightly (500k QSOs, ~5-10 min)
  performance-full:
    name: Performance (Full)
    runs-on: macos-15
    # Only run on schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run full performance test
        run: make test-performance
